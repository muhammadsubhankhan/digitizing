<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Outer navy circle -->
  <circle cx="200" cy="200" r="196" fill="#1d3557"/>
  <!-- Gold dashed stitching ring -->
  <circle cx="200" cy="200" r="183" fill="none" stroke="#f4a261" stroke-width="2.5" stroke-dasharray="7 5"/>
  <!-- Inner navy fill -->
  <circle cx="200" cy="200" r="173" fill="#1d3557"/>

  <!-- Red center banner band -->
  <clipPath id="c"><circle cx="200" cy="200" r="173"/></clipPath>
  <rect x="27" y="162" width="346" height="76" fill="#e63946" clip-path="url(#c)"/>

  <!-- Gold lines framing red band -->
  <line x1="30" y1="160" x2="370" y2="160" stroke="#f4a261" stroke-width="1.5"/>
  <line x1="30" y1="240" x2="370" y2="240" stroke="#f4a261" stroke-width="1.5"/>

  <!-- Top: CUSTOM text -->
  <text x="200" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="bold" fill="#f4a261" text-anchor="middle" letter-spacing="7">CUSTOM</text>

  <!-- Needle icon top center -->
  <line x1="168" y1="100" x2="184" y2="118" stroke="#f4a261" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="169" cy="101" rx="4" ry="2.5" fill="none" stroke="#f4a261" stroke-width="1.5" transform="rotate(-45,169,101)"/>
  <!-- Thread -->
  <path d="M184,118 Q192,130 178,140 Q168,148 174,158" fill="none" stroke="#f4a261" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Stars top -->
  <text x="108" y="115" font-family="Georgia,serif" font-size="14" fill="#f4a261" text-anchor="middle">✦</text>
  <text x="292" y="110" font-family="Georgia,serif" font-size="12" fill="#f4a261" text-anchor="middle">✦</text>
  <text x="80"  y="148" font-family="Georgia,serif" font-size="10" fill="#f4a261" text-anchor="middle">✦</text>
  <text x="320" y="145" font-family="Georgia,serif" font-size="10" fill="#f4a261" text-anchor="middle">✦</text>

  <!-- Center: PATCH HOUSE on red -->
  <text x="200" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="3">PATCH</text>
  <text x="200" y="234" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">HOUSE</text>

  <!-- Bottom: patch icon -->
  <rect x="182" y="262" width="36" height="26" rx="5" fill="none" stroke="#f4a261" stroke-width="1.8"/>
  <rect x="188" y="267" width="24" height="16" rx="2" fill="none" stroke="#f4a261" stroke-width="1.2" stroke-dasharray="3 2"/>

  <!-- Bottom decorative dividers -->
  <line x1="148" y1="302" x2="184" y2="302" stroke="#f4a261" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="200" cy="302" r="3.5" fill="#f4a261"/>
  <line x1="216" y1="302" x2="252" y2="302" stroke="#f4a261" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Outer gold border -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="#f4a261" stroke-width="2"/>
</svg>
